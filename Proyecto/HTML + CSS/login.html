<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - FlashLoan</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .login-container {
            background-image: linear-gradient(to bottom, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.05));
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white bg-opacity-90 shadow-sm">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="bg-amber-500 p-2 rounded-lg">
                    <i data-feather="zap" class="text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">Flash<span class="text-amber-500">Loan</span></h1>
            </div>
            <nav class="hidden md:flex space-x-8">
                <a href="index.html" class="text-gray-600 hover:text-amber-500 font-medium">Inicio</a>
                <a href="como_funciona.html" class="text-gray-600 hover:text-amber-500 font-medium">Cómo funciona</a>
                <a href="beneficios.html" class="text-gray-600 hover:text-amber-500 font-medium">Beneficios</a>
                <a href="#" class="text-gray-600 hover:text-amber-500 font-medium">FAQ</a>
                <a href="solicitar.html" class="text-gray-600 hover:text-amber-500 font-medium">Solicitar Préstamo</a>
            </nav>
            <div class="flex items-center space-x-4">
                <a href="login.html" class="hidden md:block px-4 py-2 text-amber-500 font-medium">
                    <i data-feather="user" class="inline mr-1"></i> Iniciar sesión
                </a>
                <a href="solicitar.html" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2 rounded-lg font-medium transition duration-300 shadow-md">
                    Solicitar préstamo
                </a>
                <button class="md:hidden">
                    <i data-feather="menu"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="min-h-screen flex items-center justify-center py-12 login-container">
        <div class="w-full max-w-md mx-4">
            <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                <div class="bg-amber-500 py-4 px-6 text-center">
                    <h2 class="text-2xl font-bold text-white">Iniciar sesión</h2>
                </div>
                <div class="p-8">
                    <form id="login-form">
                        <div class="mb-6">
                            <label for="email" class="block text-gray-700 font-medium mb-2">Correo electrónico</label>
                            <input type="email" id="email" name="email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500" placeholder="tu@email.com" required>
                        </div>
                        <div class="mb-6">
                            <label for="password" class="block text-gray-700 font-medium mb-2">Contraseña</label>
                            <input type="password" id="password" name="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500" placeholder="••••••••" required>
                        </div>
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center">
                                <input type="checkbox" id="remember" name="remember" class="h-4 w-4 text-amber-500 focus:ring-amber-500 border-gray-300 rounded">
                                <label for="remember" class="ml-2 block text-sm text-gray-700">Recordarme</label>
                            </div>
                            <a href="#" class="text-sm text-amber-500 hover:text-amber-600">¿Olvidaste tu contraseña?</a>
                        </div>
                        <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-white py-3 rounded-lg font-bold transition duration-300 shadow-md mb-4">
                            Ingresar
                        </button>
                        <div class="text-center text-sm text-gray-600">
                            ¿No tienes cuenta? <a href="registro.html" class="text-amber-500 hover:text-amber-600 font-medium">Regístrate</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-8">
        <div class="container mx-auto px-4">
            <div class="text-center">
                <p class="text-gray-400">© 2023 FlashLoan. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            feather.replace();
            
            // Form submission
            document.getElementById('login-form').addEventListener('submit', function(e) {
                e.preventDefault();
                // Here you would typically validate the credentials and log the user in
                window.location.href = 'mi_cuenta.html';
            });
        });
    </script>
</body>
</html>
